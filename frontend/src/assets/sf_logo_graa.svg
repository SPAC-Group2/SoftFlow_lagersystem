      <stop offset="0%" stop-color="#3f8ef2"/>
      <stop offset="100%" stop-color="#2d57e8"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d6073"/>
      <stop offset="100%" stop-color="#4b4f63"/>
